name: Deploy Automático para Produção (VPS)

on:
  push:
    branches: [ "main" ]

jobs:
  # =========================================================
  # FASE 1A: CONSTRUIR E GUARDAR BACKEND (Paralelo)
  # =========================================================
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      # Necessário para habilitar o cache nativo do Docker no GitHub Actions
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fazer login no GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Construir e Enviar a Imagem da API (Backend)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/obrandemburg/rascunho:latest
          # Mágica do Cache aqui:
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================
  # FASE 1B: CONSTRUIR E GUARDAR FRONTEND (Paralelo)
  # =========================================================
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fazer login no GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Construir e Enviar a Imagem do Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.Client
          push: true
          tags: ghcr.io/obrandemburg/rascunho-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================
  # FASE 2: DEPLOY NA VPS
  # =========================================================
  deploy:
    # Só executa o deploy quando TANTO o backend quanto o frontend terminarem
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Conectar na VPS via SSH e Atualizar
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /home/usuario/pontodadanca
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            
            # O Compose lê o .env e gera o arquivo preenchido
            docker compose config > docker-stack-pronto.yml
            
            # TRUQUE 1: Conserta o bug da porta (Transforma String em Integer)
            sed -i 's/published: "54321"/published: 54321/g' docker-stack-pronto.yml
            
            # TRUQUE 2: Apaga a propriedade "name:" que o Compose gera automaticamente e o Swarm odeia
            sed -i '/^[[:space:]]*name:/d' docker-stack-pronto.yml
            
            # Faz o deploy oficial limpo
            docker stack deploy --with-registry-auth -c docker-stack-pronto.yml pontodadanca
