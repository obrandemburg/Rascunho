<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ponto da Dança</title>
    <base href="/" />
    <meta name="theme-color" content="#1b5e20" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="Rascunho.Client.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <link href="https://fonts.googleapis.com/css2?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro inesperado na aplicação.
        <a href="." class="reload">Recarregar</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
        }
    </script>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!--
        NOVO: Script de interop para upload de arquivos.
        Deve vir DEPOIS do blazor.webassembly.js para garantir que
        o runtime Blazor já foi carregado quando as funções JS são chamadas.
        O arquivo fica em wwwroot/js/fileUpload.js
    -->
    <script src="js/fileUpload.js"></script>
</body>
</html>
