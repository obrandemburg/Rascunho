server {
    listen 80;
    server_name localhost;

    # Onde os arquivos do Blazor estão fisicamente
    root /usr/share/nginx/html;
    index index.html;

    # Carrega os tipos de arquivo padrão do Nginx
    include /etc/nginx/mime.types;

    # Tipos MÁGICOS obrigatórios para o Blazor WebAssembly não quebrar
    types {
        application/wasm wasm;
        application/octet-stream clr;
        application/octet-stream pdb;
        application/font-woff woff;
        application/font-woff2 woff2;
    }

    # Compressão para deixar o site muito mais rápido
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript application/wasm application/octet-stream;

    # Regra principal do SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Resolve o erro do .NET 10 não encontrando arquivos do framework
    location /_framework/ {
        # Evita que o fallback do SPA atue sobre arquivos vitais do C#
        try_files $uri =404;
    }
}